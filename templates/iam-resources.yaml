AWSTemplateFormatVersion: "2010-09-09"
Description: >
  IAM Lab - Automates creation of IAM users, groups, and a shared one-time
  password stored securely in AWS Secrets Manager. Users are assigned
  permissions via IAM groups following best practices. ec2-user2 is restricted
  from creating EC2 instances via a permission boundary.

Resources:

  # -------------------------------------------------------
  # 1. One-Time Password stored in Secrets Manager
  # -------------------------------------------------------
  IAMUserPassword:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: iam-lab/one-time-password
      Description: Temporary password for all IAM lab users
      GenerateSecretString:
        SecretStringTemplate: '{"password": "PLACEHOLDER"}'
        GenerateStringKey: password
        PasswordLength: 16
        ExcludeCharacters: '"@/\'
        RequireEachIncludedType: true

  # -------------------------------------------------------
  # 2. S3 IAM Group (List Buckets Permission)
  # -------------------------------------------------------
  S3UserGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: S3UserGroup

  S3GroupPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: S3ListBucketsPolicy
      Groups:
        - !Ref S3UserGroup
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: ListBucketsAccess
            Effect: Allow
            Action:
              - s3:ListAllMyBuckets
              - s3:GetBucketLocation
            Resource: "*"

  # -------------------------------------------------------
  # 3. EC2 IAM Group (List + Create Instances)
  # -------------------------------------------------------
  EC2UserGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: EC2UserGroup

  EC2GroupPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: EC2ListAndCreatePolicy
      Groups:
        - !Ref EC2UserGroup
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          # Read-only EC2 permissions
          - Sid: EC2ReadAccess
            Effect: Allow
            Action:
              - ec2:DescribeInstances
              - ec2:DescribeInstanceTypes
              - ec2:DescribeImages
              - ec2:DescribeKeyPairs
              - ec2:DescribeSecurityGroups
              - ec2:DescribeSubnets
              - ec2:DescribeVpcs
              - ec2:DescribeAvailabilityZones
              - ec2:DescribeNetworkInterfaces
              - ec2:DescribeVolumes
              - ec2:DescribeTags
            Resource: "*"

          # Create EC2 instances
          - Sid: EC2RunInstances
            Effect: Allow
            Action:
              - ec2:RunInstances
              - ec2:CreateTags
            Resource: "*"

  # -------------------------------------------------------
  # 4. Permission Boundary for ec2-user2
  #    Defines the MAXIMUM permissions ec2-user2 can ever have.
  #    ec2:RunInstances is intentionally excluded, so even though
  #    EC2UserGroup grants it, ec2-user2 cannot exercise it.
  # -------------------------------------------------------
  EC2User2PermissionBoundary:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: EC2ReadOnlyBoundary
      Description: >
        Permission boundary for ec2-user2. Caps effective permissions to
        EC2 read-only actions and self-service password management.
        ec2:RunInstances is not listed here, so it can never be exercised
        regardless of what group policies allow.
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowEC2ReadOnly
            Effect: Allow
            Action:
              - ec2:DescribeInstances
              - ec2:DescribeInstanceTypes
              - ec2:DescribeImages
              - ec2:DescribeKeyPairs
              - ec2:DescribeSecurityGroups
              - ec2:DescribeSubnets
              - ec2:DescribeVpcs
              - ec2:DescribeAvailabilityZones
              - ec2:DescribeNetworkInterfaces
              - ec2:DescribeVolumes
              - ec2:DescribeTags
            Resource: "*"
          - Sid: AllowSelfPasswordManagement
            Effect: Allow
            Action:
              - iam:ChangePassword
              - iam:GetAccountPasswordPolicy
            Resource: "*"

  # -------------------------------------------------------
  # 5. IAM Users (with Console Access)
  # -------------------------------------------------------

  # ec2-user1 → EC2 Group (full permissions, no boundary)
  EC2User1:
    Type: AWS::IAM::User
    DependsOn: IAMUserPassword
    Properties:
      UserName: ec2-user1
      Groups:
        - !Ref EC2UserGroup
      LoginProfile:
        Password: !Sub "{{resolve:secretsmanager:${IAMUserPassword}:SecretString:password}}"
        PasswordResetRequired: true

  # ec2-user2 → EC2 Group + Permission Boundary (read-only effective permissions)
  EC2User2:
    Type: AWS::IAM::User
    DependsOn:
      - IAMUserPassword
      - EC2User2PermissionBoundary
    Properties:
      UserName: ec2-user2
      Groups:
        - !Ref EC2UserGroup
      PermissionsBoundary: !Ref EC2User2PermissionBoundary
      LoginProfile:
        Password: !Sub "{{resolve:secretsmanager:${IAMUserPassword}:SecretString:password}}"
        PasswordResetRequired: true

  # s3-user → S3 Group only
  S3User:
    Type: AWS::IAM::User
    DependsOn: IAMUserPassword
    Properties:
      UserName: s3-user
      Groups:
        - !Ref S3UserGroup
      LoginProfile:
        Password: !Sub "{{resolve:secretsmanager:${IAMUserPassword}:SecretString:password}}"
        PasswordResetRequired: true

  # -------------------------------------------------------
  # 6. Self-Service Password Change Policy
  # -------------------------------------------------------
  IAMSelfChangePasswordPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: AllowSelfChangePassword
      Groups:
        - !Ref EC2UserGroup
        - !Ref S3UserGroup
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - iam:ChangePassword
              - iam:GetAccountPasswordPolicy
            Resource: !Join
              - ''
              - - 'arn:aws:iam::'
                - !Ref 'AWS::AccountId'
                - ':user/${aws:username}'

# -------------------------------------------------------
# Outputs (Useful for verification & demo)
# -------------------------------------------------------
Outputs:

  PasswordSecretARN:
    Description: ARN of the Secrets Manager secret holding the one-time password
    Value: !Ref IAMUserPassword

  EC2UserGroupName:
    Description: Name of the EC2 IAM group
    Value: !Ref EC2UserGroup

  S3UserGroupName:
    Description: Name of the S3 IAM group
    Value: !Ref S3UserGroup

  EC2User2BoundaryARN:
    Description: ARN of the permission boundary applied to ec2-user2
    Value: !Ref EC2User2PermissionBoundary

  EC2User1Name:
    Description: IAM User ec2-user1
    Value: !Ref EC2User1

  EC2User2Name:
    Description: IAM User ec2-user2
    Value: !Ref EC2User2

  S3UserName:
    Description: IAM User s3-user
    Value: !Ref S3User